<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stack Visualizer Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#0f172a;
overflow:hidden;
color:white;
text-align:center;
}

/* glowing background */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 20%, orange, transparent 25%),
radial-gradient(circle at 80% 30%, cyan, transparent 25%),
radial-gradient(circle at 40% 80%, purple, transparent 25%);
filter:blur(80px);
opacity:0.5;
animation:bg 8s infinite alternate;
z-index:-1;
}

@keyframes bg{
0%{transform:scale(1);}
100%{transform:scale(1.3);}
}

/* TITLE */
h1{
margin-top:15px;
text-shadow:0 0 20px orange;
}

/* INPUT */
input{
padding:10px;
border:none;
border-radius:8px;
margin:5px;
}

/* BUTTONS */
button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:orange;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 15px orange;
}

/* STACK CONTAINER (VERTICAL TOWER) */
.container{
display:flex;
flex-direction:column-reverse;
align-items:center;
justify-content:flex-start;

height:65vh;
margin-top:40px;

perspective:1200px;
}

/* STACK NODE */
.node{
width:140px;
height:45px;
margin:5px;

background:linear-gradient(135deg,#ff9900,#ff3300);
border-radius:10px;

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;
color:black;
font-size:18px;

box-shadow:0 0 15px orange;

transform-style:preserve-3d;

/* ENTRY ANIMATION */
animation:pushIn 0.5s ease;
transition:0.4s;
}

@keyframes pushIn{
0%{
opacity:0;
transform:translateY(-120px) rotateX(360deg) scale(0.3);
}
100%{
opacity:1;
transform:translateY(0) rotateX(0) scale(1);
}
}

/* POP ANIMATION */
.pop{
animation:popOut 0.5s forwards;
}

@keyframes popOut{
100%{
opacity:0;
transform:translateY(-150px) rotateX(-360deg) scale(0);
}
}

/* TOP ELEMENT */
.top{
background:yellow !important;
transform:scale(1.1);
box-shadow:0 0 25px yellow;
}

/* PARTICLES */
canvas{
position:fixed;
top:0;
left:0;
z-index:-2;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<h1>STACK VISUALIZER (PRO LEVEL)</h1>

<input id="val" placeholder="Enter value">

<button onclick="push()">Push</button>
<button onclick="pop()">Pop</button>
<button onclick="peek()">Peek</button>

<div class="container" id="box"></div>

<script>

let stack=[];

/* ===== RENDER ===== */
function render(){
let box=document.getElementById("box");
box.innerHTML="";

stack.forEach(v=>{
let div=document.createElement("div");
div.className="node";
div.innerText=v;
box.appendChild(div);
});
}

/* ===== PUSH ===== */
function push(){
let v=document.getElementById("val").value;
if(v==="") return;

stack.push(v);
render();
}

/* ===== POP WITH ANIMATION ===== */
function pop(){

let nodes=document.querySelectorAll(".node");
if(nodes.length===0) return;

let last=nodes[nodes.length-1];
last.classList.add("pop");

setTimeout(()=>{
stack.pop();
render();
},500);
}

/* ===== PEEK ===== */
function peek(){

let nodes=document.querySelectorAll(".node");

nodes.forEach(n=>n.classList.remove("top"));

if(nodes.length>0){
nodes[nodes.length-1].classList.add("top");
}
}

/* ===== PARTICLES ===== */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<70;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5)*1,
dy:(Math.random()-0.5)*1
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="orange";
ctx.fill();
});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
