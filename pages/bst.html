<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BST Visualizer Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#0f172a;
overflow:hidden;
color:white;
text-align:center;
}

/* glowing background */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 20%, cyan, transparent 25%),
radial-gradient(circle at 80% 30%, violet, transparent 25%),
radial-gradient(circle at 40% 80%, blue, transparent 25%);
filter:blur(80px);
opacity:0.5;
animation:bg 8s infinite alternate;
z-index:-1;
}

@keyframes bg{
0%{transform:scale(1);}
100%{transform:scale(1.3);}
}

/* TITLE */
h1{
margin-top:15px;
text-shadow:0 0 20px cyan;
}

/* INPUT */
input{
padding:10px;
border:none;
border-radius:8px;
margin:5px;
}

/* BUTTONS */
button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:cyan;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 15px cyan;
}

/* TREE AREA */
.container{
position:relative;
width:100%;
height:75vh;
margin-top:20px;
}

/* NODE */
.node{
position:absolute;
width:55px;
height:55px;
border-radius:50%;

background:linear-gradient(135deg,#00ffff,#0066ff);

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;
color:black;

box-shadow:0 0 15px cyan;

transition:0.4s;
}

/* HIGHLIGHT */
.active{
background:yellow !important;
transform:scale(1.3);
box-shadow:0 0 25px yellow;
}

/* FOUND */
.found{
background:lime !important;
transform:scale(1.4);
box-shadow:0 0 30px lime;
}

/* PARTICLES */
canvas{
position:fixed;
top:0;
left:0;
z-index:-2;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<h1>BST VISUALIZER (PRO LEVEL)</h1>

<input id="val" placeholder="Enter value">

<button onclick="insertNode()">Insert</button>
<button onclick="searchNode()">Search</button>
<button onclick="inorder()">Inorder</button>

<div class="container" id="tree"></div>

<script>

/* ===== NODE STRUCTURE ===== */
class Node{
constructor(data,x,y){
this.data=data;
this.left=null;
this.right=null;
this.x=x;
this.y=y;
}
}

let root=null;

/* ===== INSERT BST ===== */
function insert(root,data,x,y,space){

if(root===null){
return new Node(data,x,y);
}

if(data < root.data){
root.left=insert(root.left,data,x-space,y+80,space/2);
}
else{
root.right=insert(root.right,data,x+space,y+80,space/2);
}

return root;
}

/* ===== INSERT ===== */
function insertNode(){

let value=document.getElementById("val").value;
if(value==="") return;

let x=400;
let y=50;

root=insert(root,Number(value),x,y,200);

draw();
}

/* ===== DRAW TREE ===== */
function draw(){

let container=document.getElementById("tree");
container.innerHTML="";

function traverse(node){

if(node===null) return;

/* node */
let div=document.createElement("div");
div.className="node";
div.innerText=node.data;

div.style.left=node.x+"px";
div.style.top=node.y+"px";

container.appendChild(div);

traverse(node.left);
traverse(node.right);
}

traverse(root);
}

/* ===== SEARCH ===== */
async function searchNode(){

let value=Number(document.getElementById("val").value);

let nodes=document.querySelectorAll(".node");

for(let n of nodes){

n.classList.add("active");

await delay(400);

if(Number(n.innerText)==value){
n.classList.remove("active");
n.classList.add("found");
return;
}

n.classList.remove("active");
}
}

/* ===== INORDER TRAVERSAL (LOGICAL) ===== */
async function inorderTraversal(node){

if(node===null) return;

await inorderTraversal(node.left);

let nodes=document.querySelectorAll(".node");

for(let n of nodes){
if(Number(n.innerText)==node.data){

n.classList.add("active");
await delay(400);
n.classList.remove("active");

}
}

await inorderTraversal(node.right);
}

function inorder(){
inorderTraversal(root);
}

/* ===== DELAY ===== */
function delay(ms){
return new Promise(r=>setTimeout(r,ms));
}

/* ===== PARTICLES ===== */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<70;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5)*1,
dy:(Math.random()-0.5)*1
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="cyan";
ctx.fill();
});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
