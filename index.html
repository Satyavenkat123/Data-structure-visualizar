<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Data Structure Visualizer</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
height:100vh;
overflow:hidden;

background:linear-gradient(
-45deg,
#0f0c29,
#302b63,
#24243e,
#00c6ff,
#0072ff
);

background-size:400% 400%;

animation:bgMove 12s ease infinite;

display:flex;
justify-content:center;
align-items:center;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Floating Circles */

.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(5px);
animation:float 12s infinite linear;
}

.circle:nth-child(1){
width:180px;
height:180px;
left:5%;
top:10%;
}

.circle:nth-child(2){
width:250px;
height:250px;
right:10%;
bottom:10%;
}

.circle:nth-child(3){
width:120px;
height:120px;
left:70%;
top:15%;
}

@keyframes float{
0%{
transform:translateY(0) rotate(0deg);
}
50%{
transform:translateY(-40px) rotate(180deg);
}
100%{
transform:translateY(0) rotate(360deg);
}
}

.container{
position:relative;
z-index:10;
text-align:center;
}

.title{

font-size:5rem;
font-weight:800;

color:white;

text-shadow:
0 0 10px cyan,
0 0 20px cyan,
0 0 40px cyan,
0 0 80px cyan;

animation:glow 2s infinite alternate;
}

@keyframes glow{

from{
text-shadow:
0 0 10px cyan,
0 0 20px cyan;
}

to{
text-shadow:
0 0 20px cyan,
0 0 40px cyan,
0 0 80px cyan;
}
}

.subtitle{

margin-top:20px;

font-size:1.2rem;

color:#fff;

overflow:hidden;
white-space:nowrap;
border-right:3px solid white;

width:0;

animation:
typing 5s steps(50,end) forwards,
blink .8s infinite;
}

@keyframes typing{
from{width:0}
to{width:100%}
}

@keyframes blink{
50%{
border-color:transparent;
}
}

.cards{

margin-top:70px;

display:flex;
justify-content:center;
gap:50px;
flex-wrap:wrap;
}

.card{

width:340px;
height:240px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.2);

backdrop-filter:blur(15px);

border-radius:25px;

text-decoration:none;

color:white;

display:flex;
flex-direction:column;

justify-content:center;
align-items:center;

transition:.6s;

position:relative;

overflow:hidden;
}

.card::before{

content:"";

position:absolute;

width:200%;
height:200%;

background:
linear-gradient(
45deg,
transparent,
rgba(255,255,255,.4),
transparent
);

transform:rotate(45deg);

left:-250%;
top:-50%;

transition:1s;
}

.card:hover::before{
left:150%;
}

.card:hover{

transform:
translateY(-20px)
scale(1.08);

box-shadow:
0 0 20px cyan,
0 0 40px cyan,
0 0 80px cyan;
}

.icon{
font-size:4rem;
margin-bottom:20px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-15px);
}
}

.card h2{
margin-bottom:10px;
}

.card p{
text-align:center;
padding:0 20px;
}

</style>
</head>

<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="container">

<h1 class="title">
DATA STRUCTURE
VISUALIZER
</h1>

<p class="subtitle">
Learn Arrays, Linked Lists, Trees, Graphs, Heaps and More with Stunning Animations
</p>

<div class="cards">

<a href="linear.html" class="card">

<div class="icon">📚</div>

<h2>Linear DS</h2>

<p>
Array, Stack, Queue,
Linked List, Deque
</p>

</a>

<a href="nonlinear.html" class="card">

<div class="icon">🌳</div>

<h2>Non Linear DS</h2>

<p>
Tree, BST, Graph,
Heap, Trie
</p>

</a>

</div>

</div>

</body>
</html>
