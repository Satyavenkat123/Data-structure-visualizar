<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Non Linear Data Structures</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
height:100vh;
overflow:hidden;

/* animated cyber background */
background:linear-gradient(-45deg,#020617,#1e1b4b,#0f172a,#3b0764,#0ea5e9);
background-size:400% 400%;
animation:bgMove 10s ease infinite;

display:flex;
justify-content:center;
align-items:center;
position:relative;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* FLOATING ORBS */
.orb{
position:absolute;
border-radius:50%;
background:rgba(0,255,255,0.12);
backdrop-filter:blur(10px);
animation:float 8s infinite ease-in-out;
}

.orb:nth-child(1){
width:220px;height:220px;
top:8%;left:10%;
}

.orb:nth-child(2){
width:150px;height:150px;
bottom:10%;right:15%;
}

.orb:nth-child(3){
width:120px;height:120px;
top:20%;right:30%;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-45px);}
}

/* CONTAINER */
.container{
text-align:center;
z-index:2;
}

/* TITLE */
h1{
font-size:4rem;
color:white;
text-shadow:0 0 10px cyan,0 0 20px blue,0 0 40px purple;

animation:glow 2s infinite alternate;
}

@keyframes glow{
from{transform:scale(1); opacity:0.7;}
to{transform:scale(1.05); opacity:1;}
}

/* SUBTITLE typing */
.subtitle{
margin-top:15px;
color:#dbeafe;
font-size:1.1rem;

overflow:hidden;
white-space:nowrap;
border-right:3px solid white;
width:0;

animation:typing 4s steps(40,end) forwards,blink .8s infinite;
}

@keyframes typing{
from{width:0;}
to{width:100%;}
}

@keyframes blink{
50%{border-color:transparent;}
}

/* GRID */
.cards{
margin-top:60px;
display:flex;
gap:35px;
justify-content:center;
flex-wrap:wrap;
}

/* CARD DESIGN */
.card{
width:250px;
height:180px;

background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
backdrop-filter:blur(15px);
border-radius:25px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-decoration:none;
color:white;

transition:0.5s;
position:relative;
overflow:hidden;

animation:floatCard 4s infinite ease-in-out;
}

@keyframes floatCard{
0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}
}

/* hover effect */
.card:hover{
transform:scale(1.15) rotate(-2deg);
box-shadow:0 0 25px cyan,0 0 50px purple;
}

/* shine animation */
.card::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
top:-50%;
left:-120%;
transform:rotate(25deg);
transition:0.8s;
}

.card:hover::before{
left:120%;
}

/* ICON */
.icon{
font-size:3rem;
margin-bottom:10px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

</style>
</head>

<body>

<!-- FLOATING ORBS -->
<div class="orb"></div>
<div class="orb"></div>
<div class="orb"></div>

<div class="container">

<h1>NON LINEAR DATA STRUCTURES</h1>

<p class="subtitle">
Tree • BST • Graph • Heap 
</p>

<div class="cards">

<a href="pages/tree.html" class="card">
<div class="icon">🌳</div>
<h2>Tree</h2>
</a>

<a href="pages/bst.html" class="card">
<div class="icon">🔍</div>
<h2>BST</h2>
</a>

<a href="pages/graph.html" class="card">
<div class="icon">🌐</div>
<h2>Graph</h2>
</a>

<a href="pages/heap.html" class="card">
<div class="icon">🏔</div>
<h2>Heap</h2>
</a>


</div>

</div>

</body>
</html>
